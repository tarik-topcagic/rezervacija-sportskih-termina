<app-navbar></app-navbar>
<div class="container admin-page">
  <h1 class="mb-4">Notifications</h1>

  <form class="row g-2 align-items-end mb-4" (ngSubmit)="applyFilters()">
    <div class="col-auto">
      <label class="form-label">Type</label>
      <app-admin-select name="filterType" [(ngModel)]="filterType" [options]="typeOptions"></app-admin-select>
    </div>
    <div class="col-auto">
      <label class="form-label">Read status</label>
      <app-admin-select name="filterIsRead" [(ngModel)]="filterIsRead" [options]="isReadOptions"></app-admin-select>
    </div>
    <div class="col-auto">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" name="filterUsername" [(ngModel)]="filterUsername" />
    </div>
    <div class="col-auto">
      <button type="submit" class="btn btn-primary">Filter</button>
    </div>
    <div class="col-auto">
      <button type="button" class="btn btn-outline-secondary" (click)="clearFilters()">Clear</button>
    </div>
  </form>

  <div *ngIf="errorMessage" class="app-state-message">{{ errorMessage }}</div>

  <div class="table-responsive" *ngIf="!errorMessage">
    <table class="table table-striped align-middle">
      <thead>
        <tr>
          <th>ID</th>
          <th>Type</th>
          <th>Username</th>
          <th>Actor</th>
          <th>Read</th>
          <th>Created</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <ng-container *ngIf="isLoading">
          <tr app-skeleton-row *ngFor="let placeholder of [1, 2, 3, 4, 5, 6]" [columnCount]="7"></tr>
        </ng-container>
        <ng-container *ngIf="!isLoading">
          <tr *ngFor="let notification of pagedNotifications">
            <td>{{ notification.id }}</td>
            <td>{{ notification.type }}</td>
            <td>{{ notification.username }}</td>
            <td>{{ notification.actorName || '-' }}</td>
            <td>
              <span class="badge" [class.text-bg-success]="notification.isRead" [class.text-bg-secondary]="!notification.isRead">
                {{ notification.isRead ? 'Read' : 'Unread' }}
              </span>
            </td>
            <td>{{ notification.createdAt | date: 'short' }}</td>
            <td class="text-end">
              <button
                type="button"
                class="btn btn-sm btn-outline-danger"
                [disabled]="isPending(notification)"
                (click)="deleteNotification(notification)"
              >
                <span *ngIf="isPending(notification)" class="spinner-border spinner-border-sm" role="status"></span>
                <span *ngIf="!isPending(notification)">Delete</span>
              </button>
            </td>
          </tr>
          <tr *ngIf="!notifications.length">
            <td colspan="7" class="text-center text-muted">No notifications found.</td>
          </tr>
        </ng-container>
      </tbody>
    </table>

    <nav class="pagination-shell" aria-label="Notifications pagination" *ngIf="totalPages > 1">
      <button type="button" class="page-button" [disabled]="currentPage === 1" (click)="previousPage($event)">
        <i class="bi bi-chevron-left"></i>
      </button>
      <button
        type="button"
        class="page-number"
        *ngFor="let page of totalPagesArray"
        [class.active]="page === currentPage"
        (click)="goToPage(page, $event)"
      >
        {{ page }}
      </button>
      <button type="button" class="page-button" [disabled]="currentPage === totalPages" (click)="nextPage($event)">
        <i class="bi bi-chevron-right"></i>
      </button>
    </nav>
  </div>
</div>
