<div class="modal-backdrop" (click)="onClose()"></div>
<div class="modal-content" (click)="$event.stopPropagation()">
  <h2 class="text-center mb-4">Kreiraj grupu</h2>
  <form [formGroup]="createGroupForm" (ngSubmit)="submitGroup()">
    <div class="mb-3 text-center">
      <label for="groupImage" class="form-label">Slika grupe</label>
      <div class="mb-2">
        <ng-container *ngIf="!previewUrl; else imgPreview">
          <div
            class="rounded-circle bg-light d-flex align-items-center justify-content-center mx-auto"
            style="width: 150px; height: 150px; border: 2px dashed #ccc; cursor: pointer;"
            (click)="groupImageInput.click()"
          >
            <i class="bi bi-camera" style="font-size: 2rem"></i>
          </div>
        </ng-container>
        <ng-template #imgPreview>
          <div class="position-relative">
            <img
              [src]="previewUrl"
              alt="Slika grupe"
              class="rounded-circle"
              style="width: 150px; height: 150px; object-fit: cover;"
            />
            <button
              type="button"
              class="btn btn-sm position-absolute top-0 end-0 mt-1 me-1"  
              style="background-color: #e4e4e4;"
              (click)="removeImage()"
              title="Ukloni sliku"
            >
              <i class="bi bi-trash" style="color: #585858"></i>
            </button>
          </div>
        </ng-template>
      </div>
      <input
        type="file"
        #groupImageInput
        id="groupImage"
        (change)="onFileSelected($event)"
        class="form-control"
        style="display: none;"
      />
    </div>

    <div class="mb-3">
      <label for="groupName" class="form-label">Naziv grupe</label>
      <input id="groupName" type="text" formControlName="name" class="form-control" required>
      <div *ngIf="createGroupForm.get('name')?.touched && createGroupForm.get('name')?.invalid" class="text-danger">
        Obavezno polje
      </div>
    </div>
    <div class="mb-3">
      <label for="groupDescription" class="form-label">Opis</label>
      <textarea id="groupDescription" formControlName="description" class="form-control"></textarea>
    </div>
    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
    <div class="d-flex justify-content-between">
      <button type="submit" class="btn btn-primary" [disabled]="isSubmitting || createGroupForm.invalid">
        {{ isSubmitting ? 'Kreiranje...' : 'Kreiraj grupu' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="onClose()">Otkaži</button>
    </div>
  </form>
</div>
