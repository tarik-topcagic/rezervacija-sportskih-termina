<div class="modal-backdrop" (click)="onClose()"></div>
<div class="modal-content" (click)="onModalContentClick($event)">
  <h2 class="text-center mb-4">{{ 'editGroup' | translate }}</h2>
  <form [formGroup]="editGroupForm" (ngSubmit)="submitGroup()">
    <div class="mb-3 text-center">
      <label for="groupImage" class="form-label">{{ 'groupImage' | translate }}</label>
      <div class="mb-2 image-preview-shell">
        <div *ngIf="canDeleteGroup" class="group-actions-menu" (click)="$event.stopPropagation()">
          <button
            type="button"
            class="btn btn-sm action-menu-trigger"
            [title]="'deleteGroup' | translate"
            (click)="toggleActionsMenu($event)"
          >
            <i class="bi bi-three-dots-vertical"></i>
          </button>

          <div *ngIf="showActionsMenu" class="action-menu-dropdown">
            <button
              type="button"
              class="action-menu-item delete-action"
              (click)="deleteGroup($event)"
            >
              {{ 'deleteGroup' | translate }}
            </button>
          </div>
        </div>

        <ng-container *ngIf="!previewUrl; else imgPreview">
          <div
            class="image-picker rounded-circle bg-light d-flex align-items-center justify-content-center mx-auto"
            (click)="groupImageInput.click()"
          >
            <i class="bi bi-camera" style="font-size: 2rem"></i>
          </div>
        </ng-container>
        <ng-template #imgPreview>
          <div class="position-relative">
            <img
              [src]="previewUrl"
              [alt]="'groupImage' | translate"
              class="rounded-circle"
              style="width: 150px; height: 150px; object-fit: cover;"
            />
            <button
              type="button"
              class="btn btn-sm image-remove-button image-remove-button-left position-absolute"
              (click)="removeImage()"
              [title]="'removeImage' | translate"
            >
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </ng-template>
      </div>
      <input
        type="file"
        #groupImageInput
        id="groupImage"
        (change)="onFileSelected($event)"
        class="form-control"
        style="display: none;"
      />
    </div>
    <div class="mb-3">
      <label for="groupName" class="form-label">{{ 'groupName' | translate }}</label>
      <input id="groupName" type="text" formControlName="name" class="form-control" required>
      <div *ngIf="editGroupForm.get('name')?.touched && editGroupForm.get('name')?.invalid" class="text-danger">
        {{ 'requiredField' | translate }}
      </div>
    </div>
    <div class="mb-3">
      <label for="groupCity" class="form-label">{{ 'groupCity' | translate }}</label>
      <input id="groupCity" type="text" formControlName="grad" class="form-control" required>
      <div *ngIf="editGroupForm.get('grad')?.touched && editGroupForm.get('grad')?.invalid" class="text-danger">
        {{ 'requiredField' | translate }}
      </div>
    </div>
    <div class="mb-3">
      <label for="sportCategory" class="form-label">{{ 'sportCategory' | translate }}</label>
      <input id="sportCategory" type="text" formControlName="kategorijaSporta" class="form-control" required>
      <div *ngIf="editGroupForm.get('kategorijaSporta')?.touched && editGroupForm.get('kategorijaSporta')?.invalid" class="text-danger">
        {{ 'requiredField' | translate }}
      </div>
    </div>
    <div class="mb-3">
      <label for="groupDescription" class="form-label">{{ 'description' | translate }}</label>
      <textarea id="groupDescription" formControlName="description" class="form-control"></textarea>
    </div>
    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
    <div class="d-flex justify-content-between">
      <button type="submit" class="btn btn-primary" [disabled]="isSubmitting || editGroupForm.invalid || editGroupForm.pristine">
        {{ (isSubmitting ? 'updating' : 'updateGroup') | translate }}
      </button>
      <button type="button" class="btn btn-secondary cancel-button" (click)="onClose()">{{ 'cancel' | translate }}</button>
    </div>
  </form>
</div>
