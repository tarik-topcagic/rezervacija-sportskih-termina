<app-navbar></app-navbar>
<div *ngIf="userProfile; else loading" class="container mt-4">
  <div class="card mx-auto shadow-sm" style="max-width: 500px; position: relative; padding-bottom: 20px">
    <div class="card-body text-center">
      <div
        class="rounded-circle mb-3 mx-auto"
        style="width: 150px; height: 150px; background-color: #e9ecef; overflow: hidden; display: flex; align-items: center; justify-content: center;"
      >
        <ng-container *ngIf="userProfile.profilePictureUrl && userProfile.profilePictureUrl !== 'default-profile.png'; else defaultImage">
          <img
            [src]="userProfile.profilePictureUrl + '?t=' + timestamp"
            (error)="handleImageError()"
            [alt]="'profilePicture' | translate"
            style="width: 100%; height: 100%; object-fit: cover"
          />
        </ng-container>
        <ng-template #defaultImage>
          <div class="d-flex align-items-center justify-content-center">
            <i class="bi bi-person" style="font-size: 2rem; color: #aaa"></i>
          </div>
        </ng-template>
      </div>
      <h2 class="fw-bold">{{ userProfile.username }}</h2>
      <p class="h5 text-secondary mb-3">{{ userProfile.fullName }}</p>
      <hr />
      <p class="mb-3">
        <i class="bi bi-geo-alt-fill me-2"></i>
        {{ userProfile.location ? userProfile.location : ('notSet' | translate) }}
      </p>
    </div>
    <div class="text-center">
      <div class="d-flex justify-content-center gap-2">
        <button type="button" class="btn btn-primary">
          <i class="bi bi-chat-dots me-1"></i> {{ 'message' | translate }}
        </button>
        <button type="button" class="btn btn-primary">
          <i class="bi bi-people me-1"></i> {{ 'addToGroup' | translate }}
        </button>
      </div>
    </div>
  </div>
</div>

<ng-template #loading>
  <div class="container mt-4">
    <div class="alert alert-info" role="alert">{{ 'loading' | translate }}</div>
  </div>
</ng-template>
